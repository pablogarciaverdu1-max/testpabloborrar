<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRM Taller de Motos</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface2: #334155;
      --border: #475569;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --accent: #3b82f6;
      --danger: #ef4444;
      --success: #22c55e;
      --warning: #f59e0b;

      --mantenimiento: #ef4444;
      --siniestro: #f97316;
      --itv: #3b82f6;
      --reparacion: #22c55e;
      --primera: #eab308;
    }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* Layout */
    .app { display: flex; flex-direction: column; height: 100vh; }
    .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; }
    .header h1 { font-size: 20px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
    .header h1 span { font-size: 24px; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .content { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

    /* Config Panel */
    .config-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin: 20px; }
    .config-panel h2 { margin-bottom: 16px; color: var(--accent); }
    .config-form { display: flex; flex-direction: column; gap: 12px; }
    .config-form label { font-size: 13px; color: var(--muted); margin-bottom: 4px; display: block; }
    .config-form input { width: 100%; padding: 8px 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 14px; }

    /* Toolbar */
    .toolbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 20px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .week-nav { display: flex; align-items: center; gap: 8px; }
    .week-label { font-weight: 600; font-size: 15px; min-width: 200px; text-align: center; }

    /* Calendar */
    .calendar-wrapper { flex: 1; overflow: auto; padding: 0 20px 20px; }
    .calendar { display: grid; min-width: 900px; }
    .calendar-header { display: grid; grid-template-columns: 70px repeat(5, 1fr); border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); z-index: 10; }
    .cal-header-cell { padding: 10px 8px; text-align: center; font-size: 13px; font-weight: 600; color: var(--muted); border-right: 1px solid var(--border); }
    .cal-header-cell.today { color: var(--accent); }
    .cal-header-cell:first-child { border-right: 1px solid var(--border); }
    .calendar-body { display: grid; grid-template-columns: 70px repeat(5, 1fr); }
    .time-label { padding: 0 8px; font-size: 11px; color: var(--muted); text-align: right; display: flex; align-items: flex-start; padding-top: 4px; border-right: 1px solid var(--border); }
    .cal-cell { border-right: 1px solid var(--border); border-bottom: 1px solid rgba(71,85,105,0.4); min-height: 38px; position: relative; cursor: pointer; transition: background 0.1s; }
    .cal-cell:hover { background: rgba(59,130,246,0.06); }
    .time-row { display: contents; }
    .time-row:first-child .cal-cell { border-top: 1px solid var(--border); }

    /* Appointment chips */
    .apt-chip { position: absolute; inset: 2px; border-radius: 4px; padding: 3px 6px; font-size: 11px; font-weight: 600; cursor: pointer; overflow: hidden; display: flex; flex-direction: column; gap: 1px; z-index: 2; border: none; text-align: left; }
    .apt-chip:hover { filter: brightness(1.15); }
    .apt-chip .apt-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .apt-chip .apt-service { font-weight: 400; opacity: 0.85; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 10px; }
    .apt-cancelled { opacity: 0.4; text-decoration: line-through; }

    /* Buttons */
    .btn { padding: 8px 16px; border-radius: 6px; border: none; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: #2563eb; }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--border); }
    .btn-danger { background: var(--danger); color: white; }
    .btn-danger:hover { background: #dc2626; }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--surface2); color: var(--text); }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Modal */
    .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; display: flex; flex-direction: column; }
    .modal-lg { max-width: 700px; }
    .modal-header { padding: 20px 24px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .modal-header h2 { font-size: 18px; font-weight: 700; }
    .modal-body { padding: 20px 24px; flex: 1; }
    .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; }
    .close-btn { background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; padding: 2px 6px; border-radius: 4px; line-height: 1; }
    .close-btn:hover { background: var(--surface2); color: var(--text); }

    /* Form */
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 5px; }
    .form-group label.required::after { content: ' *'; color: var(--danger); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
    input, select, textarea { width: 100%; padding: 9px 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 14px; font-family: inherit; transition: border-color 0.15s; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
    input::placeholder, textarea::placeholder { color: var(--muted); }
    textarea { resize: vertical; min-height: 80px; }
    select option { background: var(--surface2); }

    /* Search results */
    .search-results { border: 1px solid var(--border); border-radius: 6px; background: var(--surface2); max-height: 200px; overflow-y: auto; margin-top: 4px; }
    .search-result-item { padding: 10px 12px; cursor: pointer; border-bottom: 1px solid var(--border); transition: background 0.1s; }
    .search-result-item:last-child { border-bottom: none; }
    .search-result-item:hover { background: var(--border); }
    .search-result-item .result-name { font-weight: 600; font-size: 14px; }
    .search-result-item .result-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }

    /* Steps */
    .step-indicator { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; }
    .step { display: flex; align-items: center; gap: 6px; font-size: 13px; }
    .step-dot { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; }
    .step-dot.active { background: var(--accent); color: white; }
    .step-dot.done { background: var(--success); color: white; }
    .step-dot.idle { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
    .step-line { flex: 1; height: 1px; background: var(--border); }

    /* Choice cards */
    .choice-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 8px; }
    .choice-card { background: var(--surface2); border: 2px solid var(--border); border-radius: 10px; padding: 24px; cursor: pointer; text-align: center; transition: all 0.15s; }
    .choice-card:hover { border-color: var(--accent); background: rgba(59,130,246,0.08); }
    .choice-card .cc-icon { font-size: 36px; margin-bottom: 10px; }
    .choice-card .cc-title { font-size: 16px; font-weight: 700; }
    .choice-card .cc-desc { font-size: 13px; color: var(--muted); margin-top: 4px; }

    /* Detail panel */
    .detail-section { margin-bottom: 16px; }
    .detail-section h3 { font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .detail-item label { font-size: 12px; color: var(--muted); }
    .detail-item p { font-size: 14px; font-weight: 500; }
    .service-badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; color: white; }

    /* Alerts */
    .alert { padding: 10px 14px; border-radius: 6px; font-size: 13px; margin-bottom: 12px; }
    .alert-error { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
    .alert-success { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); color: #86efac; }
    .alert-info { background: rgba(59,130,246,0.15); border: 1px solid rgba(59,130,246,0.3); color: #93c5fd; }

    /* Legend */
    .legend { display: flex; gap: 12px; flex-wrap: wrap; }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--muted); }
    .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

    /* Loading spinner */
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state { text-align: center; padding: 40px; color: var(--muted); }
    .empty-state .es-icon { font-size: 48px; margin-bottom: 12px; }

    /* Responsive tweaks */
    @media (max-width: 600px) {
      .form-row, .form-row-3 { grid-template-columns: 1fr; }
      .choice-cards { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── Config ─────────────────────────────────────────────────────────────────
const SUPABASE_CONFIG_KEY = 'crm_taller_supabase_config';

const SERVICE_COLORS = {
  mantenimiento: { bg: '#ef4444', label: 'Mantenimiento' },
  siniestro:     { bg: '#f97316', label: 'Siniestro' },
  itv:           { bg: '#3b82f6', label: 'Revisión ITV' },
  reparacion:    { bg: '#22c55e', label: 'Reparación moto' },
  primera:       { bg: '#eab308', label: '1ª Visita' },
};

const SERVICES = Object.entries(SERVICE_COLORS).map(([k,v]) => ({ value: k, ...v }));

const HOURS = [];
for (let h = 8; h <= 18; h++) {
  HOURS.push(`${String(h).padStart(2,'0')}:00`);
  if (h < 18 || true) HOURS.push(`${String(h).padStart(2,'0')}:30`);
}
// Filter to 08:00 – 18:30
const SLOTS = HOURS.filter(t => {
  const [hh, mm] = t.split(':').map(Number);
  return (hh > 8 || (hh === 8 && mm >= 0)) && (hh < 18 || (hh === 18 && mm <= 30));
}).slice(0, 22); // 08:00 to 18:30 = 22 slots

const DAYS_ES = ['Lunes','Martes','Miércoles','Jueves','Viernes'];
const DAY_ABBR = ['Lun','Mar','Mié','Jue','Vie'];

// ── Supabase client factory ─────────────────────────────────────────────────
function createClient(url, key) {
  return supabase.createClient(url, key);
}

// ── Helpers ─────────────────────────────────────────────────────────────────
function getWeekDates(refDate) {
  const d = new Date(refDate);
  const day = d.getDay(); // 0=Sun
  const diff = day === 0 ? -6 : 1 - day;
  const mon = new Date(d);
  mon.setDate(d.getDate() + diff);
  return Array.from({ length: 5 }, (_, i) => {
    const dd = new Date(mon);
    dd.setDate(mon.getDate() + i);
    return dd;
  });
}

function fmtDate(d) {
  return d.toISOString().slice(0, 10);
}

function fmtDateDisplay(d) {
  return d.toLocaleDateString('es-ES', { day: '2-digit', month: 'short' });
}

function isToday(d) {
  return fmtDate(d) === fmtDate(new Date());
}

// ── Main App ─────────────────────────────────────────────────────────────────
function App() {
  const [config, setConfig] = useState(() => {
    try { return JSON.parse(localStorage.getItem(SUPABASE_CONFIG_KEY)) || null; }
    catch { return null; }
  });
  const [sb, setSb] = useState(null);

  useEffect(() => {
    if (config?.url && config?.key) {
      try { setSb(createClient(config.url, config.key)); }
      catch { setSb(null); }
    }
  }, [config]);

  if (!config || !sb) {
    return <ConfigScreen onSave={cfg => { localStorage.setItem(SUPABASE_CONFIG_KEY, JSON.stringify(cfg)); setConfig(cfg); }} />;
  }

  return <CRMApp sb={sb} onResetConfig={() => { localStorage.removeItem(SUPABASE_CONFIG_KEY); setConfig(null); setSb(null); }} />;
}

// ── Config Screen ─────────────────────────────────────────────────────────
function ConfigScreen({ onSave }) {
  const [url, setUrl] = useState('');
  const [key, setKey] = useState('');
  const [err, setErr] = useState('');

  function handleSave() {
    if (!url.trim() || !key.trim()) { setErr('Rellena URL y clave anónima de Supabase.'); return; }
    setErr('');
    onSave({ url: url.trim(), key: key.trim() });
  }

  return (
    <div className="app">
      <div className="header">
        <h1><span>🏍️</span> CRM Taller de Motos</h1>
      </div>
      <div style={{flex:1, display:'flex', alignItems:'center', justifyContent:'center', padding:'20px'}}>
        <div className="config-panel" style={{maxWidth:480, width:'100%'}}>
          <h2>⚙️ Configurar Supabase</h2>
          <p style={{color:'var(--muted)', fontSize:'14px', marginBottom:'16px'}}>
            Introduce las credenciales de tu proyecto Supabase para conectar la aplicación.
          </p>
          {err && <div className="alert alert-error">{err}</div>}
          <div className="config-form">
            <div className="form-group">
              <label>URL del proyecto Supabase</label>
              <input placeholder="https://xxxx.supabase.co" value={url} onChange={e=>setUrl(e.target.value)} />
            </div>
            <div className="form-group">
              <label>Clave anónima (anon key)</label>
              <input placeholder="eyJhbGc..." value={key} onChange={e=>setKey(e.target.value)} type="password" />
            </div>
            <button className="btn btn-primary" onClick={handleSave}>Conectar →</button>
          </div>
          <div className="alert alert-info" style={{marginTop:'16px', fontSize:'12px'}}>
            <strong>SQL para crear tablas:</strong><br/>
            <code style={{whiteSpace:'pre-wrap', fontSize:'11px', display:'block', marginTop:'8px'}}>{SQL_SCHEMA}</code>
          </div>
        </div>
      </div>
    </div>
  );
}

const SQL_SCHEMA = `-- Ejecutar en SQL Editor de Supabase:
create table clientes (
  id uuid primary key default gen_random_uuid(),
  nombre text not null, apellidos text,
  telefono text, dni text,
  fecha_creacion timestamptz default now()
);
create table motos (
  id uuid primary key default gen_random_uuid(),
  cliente_id uuid references clientes(id) on delete cascade,
  marca text, modelo text, cilindrada text,
  matricula text, bastidor text,
  fecha_creacion timestamptz default now()
);
create type servicio_enum as enum
  ('mantenimiento','siniestro','itv','reparacion','primera');
create type estado_enum as enum ('scheduled','cancelled');
create table citas (
  id uuid primary key default gen_random_uuid(),
  cliente_id uuid references clientes(id) on delete cascade,
  moto_id uuid references motos(id) on delete set null,
  tipo_servicio servicio_enum not null,
  fecha_cita date not null, hora_cita time not null,
  nota text, estado estado_enum default 'scheduled',
  fecha_creacion timestamptz default now(),
  fecha_actualizacion timestamptz default now()
);`;

// ── CRM App ───────────────────────────────────────────────────────────────
function CRMApp({ sb, onResetConfig }) {
  const [weekOffset, setWeekOffset] = useState(0);
  const [citas, setCitas] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState('');
  const [showNewModal, setShowNewModal] = useState(false);
  const [selectedCita, setSelectedCita] = useState(null);
  const [showCancelConfirm, setShowCancelConfirm] = useState(false);

  const refDate = new Date();
  refDate.setDate(refDate.getDate() + weekOffset * 7);
  const weekDates = getWeekDates(refDate);
  const weekStart = fmtDate(weekDates[0]);
  const weekEnd = fmtDate(weekDates[4]);

  const loadCitas = useCallback(async () => {
    setLoading(true);
    setError('');
    try {
      const { data, error: e } = await sb
        .from('citas')
        .select(`*, clientes(nombre, apellidos, telefono, dni), motos(marca, modelo, matricula)`)
        .gte('fecha_cita', weekStart)
        .lte('fecha_cita', weekEnd)
        .order('hora_cita');
      if (e) throw e;
      setCitas(data || []);
    } catch (e) {
      setError('Error cargando citas: ' + (e.message || e));
    }
    setLoading(false);
  }, [sb, weekStart, weekEnd]);

  useEffect(() => { loadCitas(); }, [loadCitas]);

  async function handleCancel() {
    if (!selectedCita) return;
    const { error: e } = await sb.from('citas').update({ estado: 'cancelled', fecha_actualizacion: new Date().toISOString() }).eq('id', selectedCita.id);
    if (e) { alert('Error: ' + e.message); return; }
    setShowCancelConfirm(false);
    setSelectedCita(null);
    loadCitas();
  }

  const citasBySlot = {};
  citas.forEach(c => {
    const key = `${c.fecha_cita}_${c.hora_cita?.slice(0,5)}`;
    if (!citasBySlot[key]) citasBySlot[key] = [];
    citasBySlot[key].push(c);
  });

  return (
    <div className="app">
      <div className="header">
        <h1><span>🏍️</span> CRM Taller de Motos</h1>
        <div className="header-right">
          <div className="legend">
            {SERVICES.map(s => (
              <div key={s.value} className="legend-item">
                <div className="legend-dot" style={{background:s.bg}} />
                {s.label}
              </div>
            ))}
          </div>
          <button className="btn btn-ghost btn-sm" onClick={onResetConfig}>⚙️</button>
        </div>
      </div>

      <div className="toolbar">
        <button className="btn btn-primary" onClick={() => setShowNewModal(true)}>
          + Nueva Cita
        </button>
        <div className="week-nav">
          <button className="btn btn-secondary btn-sm" onClick={() => setWeekOffset(o => o - 1)}>‹ Semana anterior</button>
          <span className="week-label">
            {fmtDateDisplay(weekDates[0])} – {fmtDateDisplay(weekDates[4])}
          </span>
          <button className="btn btn-secondary btn-sm" onClick={() => setWeekOffset(o => o + 1)}>Semana siguiente ›</button>
        </div>
        <button className="btn btn-ghost btn-sm" onClick={() => setWeekOffset(0)}>Hoy</button>
        {loading && <span style={{color:'var(--muted)', fontSize:'13px'}}>Cargando...</span>}
      </div>

      {error && <div className="alert alert-error" style={{margin:'12px 20px'}}>{error}</div>}

      <div className="calendar-wrapper">
        <div className="calendar">
          <div className="calendar-header">
            <div className="cal-header-cell" />
            {weekDates.map((d, i) => (
              <div key={i} className={`cal-header-cell${isToday(d) ? ' today' : ''}`}>
                {DAY_ABBR[i]}<br/>
                <span style={{fontSize:'18px', fontWeight:700}}>{d.getDate()}</span>
              </div>
            ))}
          </div>
          <div className="calendar-body">
            {SLOTS.map(slot => (
              <React.Fragment key={slot}>
                <div className="time-label">{slot}</div>
                {weekDates.map((d, di) => {
                  const dateStr = fmtDate(d);
                  const key = `${dateStr}_${slot}`;
                  const slotCitas = citasBySlot[key] || [];
                  return (
                    <div key={di} className="cal-cell" onClick={() => { if (!slotCitas.length) setShowNewModal(true); }}>
                      {slotCitas.map(c => {
                        const svc = SERVICE_COLORS[c.tipo_servicio] || { bg: '#666' };
                        const cancelled = c.estado === 'cancelled';
                        return (
                          <button
                            key={c.id}
                            className={`apt-chip${cancelled ? ' apt-cancelled' : ''}`}
                            style={{ background: svc.bg, color: 'white' }}
                            onClick={e => { e.stopPropagation(); setSelectedCita(c); }}
                          >
                            <span className="apt-name">{c.clientes?.nombre} {c.clientes?.apellidos}</span>
                            <span className="apt-service">{svc.label}</span>
                          </button>
                        );
                      })}
                    </div>
                  );
                })}
              </React.Fragment>
            ))}
          </div>
        </div>
      </div>

      {showNewModal && (
        <NewCitaModal
          sb={sb}
          onClose={() => setShowNewModal(false)}
          onCreated={() => { setShowNewModal(false); loadCitas(); }}
        />
      )}

      {selectedCita && !showCancelConfirm && (
        <CitaDetailModal
          cita={selectedCita}
          onClose={() => setSelectedCita(null)}
          onCancel={() => setShowCancelConfirm(true)}
        />
      )}

      {showCancelConfirm && (
        <ConfirmModal
          title="¿Cancelar cita?"
          message={`¿Seguro que quieres cancelar la cita de ${selectedCita?.clientes?.nombre} ${selectedCita?.clientes?.apellidos || ''}?`}
          onConfirm={handleCancel}
          onClose={() => setShowCancelConfirm(false)}
        />
      )}
    </div>
  );
}

// ── New Cita Modal (multi-step) ───────────────────────────────────────────
function NewCitaModal({ sb, onClose, onCreated }) {
  const [step, setStep] = useState('choice'); // choice | new-client | search-client | moto | cita
  const [cliente, setCliente] = useState(null);
  const [moto, setMoto] = useState(null);
  const [error, setError] = useState('');
  const [saving, setSaving] = useState(false);

  // Client form state
  const [clientForm, setClientForm] = useState({ nombre:'', apellidos:'', telefono:'', dni:'' });
  // Moto form state
  const [motoForm, setMotoForm] = useState({ marca:'', modelo:'', cilindrada:'', matricula:'', bastidor:'' });
  // Cita form state
  const [citaForm, setCitaForm] = useState({ tipo_servicio:'mantenimiento', fecha_cita: fmtDate(new Date()), hora_cita:'09:00', nota:'' });

  // Search state
  const [searchQuery, setSearchQuery] = useState('');
  const [searchResults, setSearchResults] = useState([]);
  const [searching, setSearching] = useState(false);
  const searchTimer = useRef(null);

  // Client motos for existing client
  const [clientMotos, setClientMotos] = useState([]);
  const [selectedMotoId, setSelectedMotoId] = useState('new');

  useEffect(() => {
    if (step !== 'search-client') return;
    if (searchTimer.current) clearTimeout(searchTimer.current);
    if (!searchQuery.trim()) { setSearchResults([]); return; }
    searchTimer.current = setTimeout(async () => {
      setSearching(true);
      const q = searchQuery.trim();
      const { data } = await sb.from('clientes').select('*, motos(*)').or(
        `nombre.ilike.%${q}%,apellidos.ilike.%${q}%,telefono.ilike.%${q}%,dni.ilike.%${q}%`
      ).limit(10);
      // Also search by moto matricula
      const { data: mData } = await sb.from('motos').select('*, clientes(*)').ilike('matricula', `%${q}%`).limit(5);
      const fromMotos = (mData || []).map(m => ({ ...m.clientes, motos: [m] }));
      const combined = [...(data||[]), ...fromMotos];
      const seen = new Set();
      setSearchResults(combined.filter(c => { if (seen.has(c.id)) return false; seen.add(c.id); return true; }));
      setSearching(false);
    }, 350);
  }, [searchQuery, step]);

  async function loadClientMotos(clientId) {
    const { data } = await sb.from('motos').select('*').eq('cliente_id', clientId);
    setClientMotos(data || []);
    setSelectedMotoId(data?.length ? data[0].id : 'new');
  }

  function selectCliente(c) {
    setCliente(c);
    loadClientMotos(c.id);
    setStep('moto');
  }

  async function saveNewClient() {
    if (!clientForm.nombre.trim()) { setError('El nombre es obligatorio.'); return; }
    setSaving(true); setError('');
    // Check duplicate by phone or dni
    if (clientForm.telefono || clientForm.dni) {
      let or = [];
      if (clientForm.telefono) or.push(`telefono.eq.${clientForm.telefono}`);
      if (clientForm.dni) or.push(`dni.eq.${clientForm.dni}`);
      const { data: existing } = await sb.from('clientes').select('*').or(or.join(',')).limit(1);
      if (existing?.length) {
        setSaving(false);
        setError(`Ya existe un cliente con ese ${clientForm.telefono ? 'teléfono' : 'DNI'}. ¿Usar el existente?`);
        return;
      }
    }
    const { data, error: e } = await sb.from('clientes').insert([clientForm]).select().single();
    setSaving(false);
    if (e) { setError(e.message); return; }
    setCliente(data);
    setClientMotos([]);
    setSelectedMotoId('new');
    setStep('moto');
  }

  async function saveCita() {
    setError('');
    if (!citaForm.fecha_cita || !citaForm.hora_cita) { setError('Fecha y hora son obligatorias.'); return; }
    setSaving(true);
    let motoId = null;
    if (selectedMotoId === 'new') {
      // Save new moto if at least marca or matricula filled
      if (motoForm.marca || motoForm.matricula) {
        const { data: md, error: me } = await sb.from('motos').insert([{ ...motoForm, cliente_id: cliente.id }]).select().single();
        if (me) { setSaving(false); setError(me.message); return; }
        motoId = md.id;
      }
    } else {
      motoId = selectedMotoId;
    }
    const { error: ce } = await sb.from('citas').insert([{
      cliente_id: cliente.id,
      moto_id: motoId,
      tipo_servicio: citaForm.tipo_servicio,
      fecha_cita: citaForm.fecha_cita,
      hora_cita: citaForm.hora_cita,
      nota: citaForm.nota,
      estado: 'scheduled',
    }]);
    setSaving(false);
    if (ce) { setError(ce.message); return; }
    onCreated();
  }

  const stepNames = { choice: 1, 'new-client': 2, 'search-client': 2, moto: 3, cita: 4 };
  const currentStep = stepNames[step] || 1;

  return (
    <div className="modal-backdrop">
      <div className="modal modal-lg">
        <div className="modal-header">
          <h2>Nueva Cita</h2>
          <button className="close-btn" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          {/* Step indicator */}
          <div className="step-indicator">
            {['Tipo cliente','Cliente','Moto','Cita'].map((label, i) => (
              <React.Fragment key={i}>
                <div className="step">
                  <div className={`step-dot ${currentStep > i+1 ? 'done' : currentStep === i+1 ? 'active' : 'idle'}`}>
                    {currentStep > i+1 ? '✓' : i+1}
                  </div>
                  <span style={{fontSize:'12px', color: currentStep === i+1 ? 'var(--text)' : 'var(--muted)'}}>{label}</span>
                </div>
                {i < 3 && <div className="step-line" />}
              </React.Fragment>
            ))}
          </div>

          {error && <div className="alert alert-error">{error}</div>}

          {/* Step: choice */}
          {step === 'choice' && (
            <div>
              <p style={{color:'var(--muted)', marginBottom:'16px'}}>¿El cliente es nuevo o ya existe en el sistema?</p>
              <div className="choice-cards">
                <div className="choice-card" onClick={() => setStep('new-client')}>
                  <div className="cc-icon">👤</div>
                  <div className="cc-title">Cliente nuevo</div>
                  <div className="cc-desc">Registrar nuevo cliente</div>
                </div>
                <div className="choice-card" onClick={() => setStep('search-client')}>
                  <div className="cc-icon">🔍</div>
                  <div className="cc-title">Cliente existente</div>
                  <div className="cc-desc">Buscar por nombre, DNI, teléfono o matrícula</div>
                </div>
              </div>
            </div>
          )}

          {/* Step: new client form */}
          {step === 'new-client' && (
            <div>
              <div className="form-row">
                <div className="form-group">
                  <label className="required">Nombre</label>
                  <input value={clientForm.nombre} onChange={e=>setClientForm(f=>({...f,nombre:e.target.value}))} placeholder="Nombre" />
                </div>
                <div className="form-group">
                  <label>Apellidos</label>
                  <input value={clientForm.apellidos} onChange={e=>setClientForm(f=>({...f,apellidos:e.target.value}))} placeholder="Apellidos" />
                </div>
              </div>
              <div className="form-row">
                <div className="form-group">
                  <label>Teléfono</label>
                  <input value={clientForm.telefono} onChange={e=>setClientForm(f=>({...f,telefono:e.target.value}))} placeholder="600 000 000" type="tel" />
                </div>
                <div className="form-group">
                  <label>DNI (opcional)</label>
                  <input value={clientForm.dni} onChange={e=>setClientForm(f=>({...f,dni:e.target.value}))} placeholder="12345678A" />
                </div>
              </div>
            </div>
          )}

          {/* Step: search client */}
          {step === 'search-client' && (
            <div>
              <div className="form-group">
                <label>Buscar cliente</label>
                <input
                  autoFocus
                  value={searchQuery}
                  onChange={e=>setSearchQuery(e.target.value)}
                  placeholder="Nombre, DNI, teléfono o matrícula..."
                />
              </div>
              {searching && <p style={{color:'var(--muted)', fontSize:'13px'}}>Buscando...</p>}
              {searchResults.length > 0 && (
                <div className="search-results">
                  {searchResults.map(c => (
                    <div key={c.id} className="search-result-item" onClick={() => selectCliente(c)}>
                      <div className="result-name">{c.nombre} {c.apellidos}</div>
                      <div className="result-meta">
                        {c.telefono && `📞 ${c.telefono}`}
                        {c.dni && ` · DNI: ${c.dni}`}
                        {c.motos?.length > 0 && ` · Motos: ${c.motos.map(m=>m.matricula||m.marca).join(', ')}`}
                      </div>
                    </div>
                  ))}
                </div>
              )}
              {searchQuery && !searching && searchResults.length === 0 && (
                <div className="alert alert-info">
                  No se encontró ningún cliente.{' '}
                  <button className="btn btn-sm btn-secondary" style={{marginTop:'8px'}} onClick={() => setStep('new-client')}>
                    Crear nuevo cliente
                  </button>
                </div>
              )}
            </div>
          )}

          {/* Step: moto */}
          {step === 'moto' && (
            <div>
              {cliente && (
                <div className="alert alert-success" style={{marginBottom:'14px'}}>
                  Cliente: <strong>{cliente.nombre} {cliente.apellidos}</strong>
                  {cliente.telefono && ` · ${cliente.telefono}`}
                </div>
              )}
              {clientMotos.length > 0 && (
                <div className="form-group">
                  <label>¿Qué moto?</label>
                  <select value={selectedMotoId} onChange={e=>setSelectedMotoId(e.target.value)}>
                    {clientMotos.map(m => (
                      <option key={m.id} value={m.id}>{m.marca} {m.modelo} – {m.matricula}</option>
                    ))}
                    <option value="new">+ Nueva moto</option>
                  </select>
                </div>
              )}
              {(selectedMotoId === 'new' || clientMotos.length === 0) && (
                <>
                  <div className="form-row">
                    <div className="form-group">
                      <label>Marca</label>
                      <input value={motoForm.marca} onChange={e=>setMotoForm(f=>({...f,marca:e.target.value}))} placeholder="Honda, Yamaha..." />
                    </div>
                    <div className="form-group">
                      <label>Modelo</label>
                      <input value={motoForm.modelo} onChange={e=>setMotoForm(f=>({...f,modelo:e.target.value}))} placeholder="CB500, MT07..." />
                    </div>
                  </div>
                  <div className="form-row-3">
                    <div className="form-group">
                      <label>Cilindrada</label>
                      <input value={motoForm.cilindrada} onChange={e=>setMotoForm(f=>({...f,cilindrada:e.target.value}))} placeholder="500cc" />
                    </div>
                    <div className="form-group">
                      <label>Matrícula</label>
                      <input value={motoForm.matricula} onChange={e=>setMotoForm(f=>({...f,matricula:e.target.value}))} placeholder="1234ABC" />
                    </div>
                    <div className="form-group">
                      <label>Bastidor (VIN)</label>
                      <input value={motoForm.bastidor} onChange={e=>setMotoForm(f=>({...f,bastidor:e.target.value}))} placeholder="VIN..." />
                    </div>
                  </div>
                </>
              )}
            </div>
          )}

          {/* Step: cita */}
          {step === 'cita' && (
            <div>
              <div className="form-group">
                <label className="required">Tipo de servicio</label>
                <select value={citaForm.tipo_servicio} onChange={e=>setCitaForm(f=>({...f,tipo_servicio:e.target.value}))}>
                  {SERVICES.map(s => <option key={s.value} value={s.value}>{s.label}</option>)}
                </select>
              </div>
              <div className="form-row">
                <div className="form-group">
                  <label className="required">Fecha</label>
                  <input type="date" value={citaForm.fecha_cita} onChange={e=>setCitaForm(f=>({...f,fecha_cita:e.target.value}))} />
                </div>
                <div className="form-group">
                  <label className="required">Hora</label>
                  <select value={citaForm.hora_cita} onChange={e=>setCitaForm(f=>({...f,hora_cita:e.target.value}))}>
                    {SLOTS.map(s => <option key={s} value={s}>{s}</option>)}
                  </select>
                </div>
              </div>
              <div className="form-group">
                <label>Nota</label>
                <textarea value={citaForm.nota} onChange={e=>setCitaForm(f=>({...f,nota:e.target.value}))} placeholder="Observaciones, descripción del problema..." />
              </div>
            </div>
          )}
        </div>

        <div className="modal-footer">
          {step !== 'choice' && (
            <button className="btn btn-ghost" onClick={() => {
              const prev = { 'new-client':'choice', 'search-client':'choice', moto: cliente ? (step === 'moto' ? 'choice' : 'moto') : 'choice', cita:'moto' };
              setStep(prev[step] || 'choice');
              setError('');
            }}>← Atrás</button>
          )}
          <button className="btn btn-secondary" onClick={onClose}>Cancelar</button>
          {step === 'new-client' && (
            <button className="btn btn-primary" disabled={saving} onClick={saveNewClient}>
              {saving ? <><span className="spinner" /> Guardando...</> : 'Guardar cliente →'}
            </button>
          )}
          {step === 'moto' && (
            <button className="btn btn-primary" onClick={() => { setError(''); setStep('cita'); }}>
              Siguiente →
            </button>
          )}
          {step === 'cita' && (
            <button className="btn btn-primary" disabled={saving} onClick={saveCita}>
              {saving ? <><span className="spinner" /> Guardando...</> : '✓ Crear cita'}
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

// ── Cita Detail Modal ──────────────────────────────────────────────────────
function CitaDetailModal({ cita, onClose, onCancel }) {
  const svc = SERVICE_COLORS[cita.tipo_servicio] || { bg: '#666', label: cita.tipo_servicio };
  const c = cita.clientes || {};
  const m = cita.motos || {};
  const cancelled = cita.estado === 'cancelled';

  return (
    <div className="modal-backdrop">
      <div className="modal">
        <div className="modal-header">
          <h2>Detalle de Cita</h2>
          <button className="close-btn" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <div style={{marginBottom:'16px', display:'flex', alignItems:'center', gap:'10px'}}>
            <span className="service-badge" style={{background:svc.bg}}>{svc.label}</span>
            {cancelled && <span className="service-badge" style={{background:'#64748b'}}>Cancelada</span>}
          </div>

          <div className="detail-section">
            <h3>📅 Fecha y Hora</h3>
            <div className="detail-grid">
              <div className="detail-item"><label>Fecha</label><p>{cita.fecha_cita}</p></div>
              <div className="detail-item"><label>Hora</label><p>{cita.hora_cita?.slice(0,5)}</p></div>
            </div>
          </div>

          <div className="detail-section">
            <h3>👤 Cliente</h3>
            <div className="detail-grid">
              <div className="detail-item"><label>Nombre</label><p>{c.nombre} {c.apellidos}</p></div>
              <div className="detail-item"><label>Teléfono</label><p>{c.telefono || '—'}</p></div>
              <div className="detail-item"><label>DNI</label><p>{c.dni || '—'}</p></div>
            </div>
          </div>

          {m.marca && (
            <div className="detail-section">
              <h3>🏍️ Moto</h3>
              <div className="detail-grid">
                <div className="detail-item"><label>Marca / Modelo</label><p>{m.marca} {m.modelo}</p></div>
                <div className="detail-item"><label>Matrícula</label><p>{m.matricula || '—'}</p></div>
              </div>
            </div>
          )}

          {cita.nota && (
            <div className="detail-section">
              <h3>📝 Nota</h3>
              <p style={{fontSize:'14px', color:'var(--text)'}}>{cita.nota}</p>
            </div>
          )}
        </div>
        <div className="modal-footer">
          <button className="btn btn-secondary" onClick={onClose}>Cerrar</button>
          {!cancelled && (
            <button className="btn btn-danger" onClick={onCancel}>Cancelar cita</button>
          )}
        </div>
      </div>
    </div>
  );
}

// ── Confirm Modal ──────────────────────────────────────────────────────────
function ConfirmModal({ title, message, onConfirm, onClose }) {
  return (
    <div className="modal-backdrop">
      <div className="modal" style={{maxWidth:400}}>
        <div className="modal-header">
          <h2>{title}</h2>
          <button className="close-btn" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <p style={{color:'var(--muted)'}}>{message}</p>
        </div>
        <div className="modal-footer">
          <button className="btn btn-secondary" onClick={onClose}>No, mantener</button>
          <button className="btn btn-danger" onClick={onConfirm}>Sí, cancelar cita</button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
