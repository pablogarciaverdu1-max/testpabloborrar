<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRM Taller de Motos</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f172a; --surface: #1e293b; --surface2: #334155;
      --border: #475569; --text: #f1f5f9; --muted: #94a3b8;
      --accent: #3b82f6; --danger: #ef4444; --success: #22c55e;
    }
    html, body { height: 100%; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    /* ── Header ── */
    #header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 20px; height: 52px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    #header h1 { font-size: 17px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .legend { display: flex; gap: 14px; }
    .leg { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--muted); }
    .leg-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }

    /* ── Toolbar ── */
    #toolbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 8px 20px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    #week-label { font-size: 14px; font-weight: 600; min-width: 210px; text-align: center; }

    /* ── Calendar ── */
    #cal-scroll { flex: 1; overflow: auto; }
    #cal-grid { display: grid; grid-template-columns: 64px repeat(5, 1fr); min-width: 680px; }
    .ch { position: sticky; top: 0; z-index: 10; background: var(--bg); border-bottom: 2px solid var(--border); padding: 8px 6px; text-align: center; font-size: 12px; font-weight: 600; color: var(--muted); border-right: 1px solid var(--border); }
    .ch:last-child { border-right: none; }
    .ch.today { color: var(--accent); }
    .ch .day-n { font-size: 20px; font-weight: 700; display: block; margin-top: 1px; }
    .tl { border-right: 1px solid var(--border); border-bottom: 1px solid rgba(71,85,105,0.35); height: 40px; font-size: 11px; color: var(--muted); text-align: right; padding: 4px 6px 0 0; }
    .cc { border-right: 1px solid var(--border); border-bottom: 1px solid rgba(71,85,105,0.35); height: 40px; position: relative; cursor: pointer; transition: background 0.1s; }
    .cc:last-child { border-right: none; }
    .cc:hover { background: rgba(59,130,246,0.07); }
    .cc.today-col { background: rgba(59,130,246,0.04); }
    .chip { position: absolute; inset: 2px; border-radius: 4px; padding: 3px 6px; font-size: 11px; font-weight: 600; cursor: pointer; overflow: hidden; border: none; text-align: left; color: white; display: flex; flex-direction: column; gap: 1px; }
    .chip:hover { filter: brightness(1.12); }
    .chip-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chip-svc  { font-size: 10px; font-weight: 400; opacity: 0.88; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chip.cancelled { opacity: 0.4; }
    .chip.cancelled .chip-name { text-decoration: line-through; }

    /* ── Buttons ── */
    .btn { padding: 7px 14px; border-radius: 6px; border: none; font-size: 13px; font-weight: 500; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: all 0.15s; white-space: nowrap; }
    .btn-primary  { background: var(--accent); color: white; }
    .btn-primary:hover  { background: #2563eb; }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--border); }
    .btn-danger { background: var(--danger); color: white; }
    .btn-danger:hover { background: #dc2626; }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--surface2); color: var(--text); }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Modal ── */
    .backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
    .backdrop.open { display: flex; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; width: 100%; max-width: 540px; max-height: 90vh; overflow-y: auto; display: flex; flex-direction: column; }
    .mh { padding: 16px 20px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .mh h2 { font-size: 16px; font-weight: 700; }
    .mb { padding: 16px 20px; flex: 1; }
    .mf { padding: 12px 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }
    .close-x { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; padding: 2px 6px; border-radius: 4px; line-height: 1; }
    .close-x:hover { background: var(--surface2); color: var(--text); }

    /* ── Form ── */
    .fg { margin-bottom: 12px; }
    .fg label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
    .fg label.req::after { content: ' *'; color: var(--danger); }
    .fr2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .fr3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    input, select, textarea { width: 100%; padding: 8px 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 13px; font-family: inherit; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
    input::placeholder, textarea::placeholder { color: var(--muted); }
    textarea { resize: vertical; min-height: 70px; }
    select option { background: var(--surface2); }

    /* ── Steps ── */
    .steps { display: flex; align-items: center; gap: 5px; margin-bottom: 16px; }
    .sdot { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }
    .sdot.active { background: var(--accent); color: white; }
    .sdot.done   { background: var(--success); color: white; }
    .sdot.idle   { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
    .slabel { font-size: 11px; }
    .slabel.active { color: var(--text); font-weight: 600; }
    .slabel.idle   { color: var(--muted); }
    .sline { flex: 1; height: 1px; background: var(--border); }

    /* ── Choice cards ── */
    .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 6px; }
    .card { background: var(--surface2); border: 2px solid var(--border); border-radius: 10px; padding: 20px 14px; cursor: pointer; text-align: center; transition: all 0.15s; }
    .card:hover { border-color: var(--accent); background: rgba(59,130,246,0.08); }
    .card .ci { font-size: 30px; margin-bottom: 6px; }
    .card .ct { font-size: 14px; font-weight: 700; }
    .card .cd { font-size: 12px; color: var(--muted); margin-top: 3px; }

    /* ── Search drop ── */
    .sdrop { border: 1px solid var(--border); border-radius: 6px; background: var(--surface2); max-height: 190px; overflow-y: auto; margin-top: 4px; }
    .sitem { padding: 10px 12px; cursor: pointer; border-bottom: 1px solid var(--border); transition: background 0.1s; }
    .sitem:last-child { border-bottom: none; }
    .sitem:hover { background: var(--border); }
    .sitem-name { font-weight: 600; font-size: 13px; }
    .sitem-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* ── Alerts ── */
    .alert { padding: 9px 13px; border-radius: 6px; font-size: 13px; margin-bottom: 10px; }
    .alert-err  { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
    .alert-ok   { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); color: #86efac; }
    .alert-info { background: rgba(59,130,246,0.15); border: 1px solid rgba(59,130,246,0.3); color: #93c5fd; }

    /* ── Detail ── */
    .ds { margin-bottom: 14px; }
    .ds h3 { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 6px; }
    .dg { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .di label { font-size: 11px; color: var(--muted); }
    .di p { font-size: 13px; font-weight: 500; margin-top: 1px; }
    .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; color: white; }

    /* step panels — hide/show via JS */
    .step-panel { display: none; }
    .step-panel.active { display: block; }

    @media (max-width: 600px) { .fr2,.fr3,.cards { grid-template-columns: 1fr; } .legend { display: none; } }
  </style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <h1>🏍️ CRM Taller de Motos</h1>
  <div class="legend" id="legend"></div>
</div>

<!-- TOOLBAR -->
<div id="toolbar">
  <button class="btn btn-primary" id="btn-new">+ Nueva Cita</button>
  <button class="btn btn-ghost btn-sm" id="btn-prev">‹ Anterior</button>
  <span id="week-label"></span>
  <button class="btn btn-ghost btn-sm" id="btn-next">Siguiente ›</button>
  <button class="btn btn-secondary btn-sm" id="btn-today">Hoy</button>
</div>

<!-- CALENDAR -->
<div id="cal-scroll">
  <div id="cal-grid"></div>
</div>

<!-- ═══ MODAL: Nueva Cita ═══ -->
<div class="backdrop" id="modal-new">
  <div class="modal">
    <div class="mh">
      <h2>Nueva Cita</h2>
      <button class="close-x" data-close="modal-new">✕</button>
    </div>
    <div class="mb">
      <!-- Step indicator -->
      <div class="steps" id="steps-new"></div>
      <div id="alert-new"></div>

      <!-- Step 1: choice -->
      <div class="step-panel active" id="panel-choice">
        <p style="color:var(--muted);font-size:13px;margin-bottom:12px">¿El cliente ya está registrado en el sistema?</p>
        <div class="cards">
          <div class="card" id="btn-choice-new">
            <div class="ci">👤</div>
            <div class="ct">Cliente nuevo</div>
            <div class="cd">Primera vez en el taller</div>
          </div>
          <div class="card" id="btn-choice-existing">
            <div class="ci">🔍</div>
            <div class="ct">Cliente existente</div>
            <div class="cd">Buscar por nombre, DNI, teléfono o matrícula</div>
          </div>
        </div>
      </div>

      <!-- Step 2a: new client -->
      <div class="step-panel" id="panel-new-client">
        <div class="fr2">
          <div class="fg"><label class="req">Nombre</label><input id="c-nombre" placeholder="Nombre" /></div>
          <div class="fg"><label>Apellidos</label><input id="c-apellidos" placeholder="Apellidos" /></div>
        </div>
        <div class="fr2">
          <div class="fg"><label>Teléfono</label><input id="c-telefono" placeholder="600 000 000" type="tel" /></div>
          <div class="fg"><label>DNI (opcional)</label><input id="c-dni" placeholder="12345678A" /></div>
        </div>
      </div>

      <!-- Step 2b: search client -->
      <div class="step-panel" id="panel-search">
        <div class="fg">
          <label>Buscar por nombre, DNI, teléfono o matrícula</label>
          <input id="search-q" placeholder="Escribe para buscar..." autocomplete="off" />
        </div>
        <div class="sdrop" id="search-results" style="display:none"></div>
        <div id="search-empty" style="display:none" class="alert alert-info"></div>
      </div>

      <!-- Step 3: moto -->
      <div class="step-panel" id="panel-moto">
        <div class="alert alert-ok" id="moto-client-info" style="margin-bottom:12px"></div>
        <div class="fg" id="moto-select-wrap" style="display:none">
          <label>Moto del cliente</label>
          <select id="moto-select"></select>
        </div>
        <div id="moto-form">
          <div class="fr2">
            <div class="fg"><label>Marca</label><input id="m-marca" placeholder="Honda, Yamaha..." /></div>
            <div class="fg"><label>Modelo</label><input id="m-modelo" placeholder="CB500, MT-07..." /></div>
          </div>
          <div class="fr3">
            <div class="fg"><label>Cilindrada</label><input id="m-cilindrada" placeholder="500cc" /></div>
            <div class="fg"><label>Matrícula</label><input id="m-matricula" placeholder="1234ABC" /></div>
            <div class="fg"><label>Bastidor</label><input id="m-bastidor" placeholder="VIN..." /></div>
          </div>
        </div>
      </div>

      <!-- Step 4: cita -->
      <div class="step-panel" id="panel-cita">
        <div class="fg">
          <label class="req">Tipo de servicio</label>
          <select id="a-tipo"></select>
        </div>
        <div class="fr2">
          <div class="fg"><label class="req">Fecha</label><input type="date" id="a-fecha" /></div>
          <div class="fg"><label class="req">Hora</label><select id="a-hora"></select></div>
        </div>
        <div class="fg"><label>Nota</label><textarea id="a-nota" placeholder="Descripción del problema, observaciones..."></textarea></div>
      </div>
    </div>
    <div class="mf">
      <button class="btn btn-ghost" id="btn-back" style="margin-right:auto;display:none">← Atrás</button>
      <button class="btn btn-secondary" data-close="modal-new">Cancelar</button>
      <button class="btn btn-primary" id="btn-next-step" style="display:none">Siguiente →</button>
    </div>
  </div>
</div>

<!-- ═══ MODAL: Detalle cita ═══ -->
<div class="backdrop" id="modal-detail">
  <div class="modal">
    <div class="mh">
      <h2>Detalle de Cita</h2>
      <button class="close-x" data-close="modal-detail">✕</button>
    </div>
    <div class="mb" id="detail-body"></div>
    <div class="mf">
      <button class="btn btn-secondary" data-close="modal-detail">Cerrar</button>
      <button class="btn btn-danger" id="btn-cancel-cita">Cancelar cita</button>
    </div>
  </div>
</div>

<!-- ═══ MODAL: Confirm ═══ -->
<div class="backdrop" id="modal-confirm">
  <div class="modal" style="max-width:380px">
    <div class="mh"><h2>Confirmar cancelación</h2><button class="close-x" data-close="modal-confirm">✕</button></div>
    <div class="mb">
      <p id="confirm-msg" style="color:var(--muted);font-size:14px"></p>
      <p style="font-size:12px;color:var(--muted);margin-top:6px">Esta acción no se puede deshacer.</p>
    </div>
    <div class="mf">
      <button class="btn btn-secondary" data-close="modal-confirm">No, mantener</button>
      <button class="btn btn-danger" id="btn-confirm-ok">Sí, cancelar cita</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════════════
const SERVICES = [
  { value:'mantenimiento', label:'Mantenimiento',   color:'#ef4444' },
  { value:'siniestro',     label:'Siniestro',       color:'#f97316' },
  { value:'itv',           label:'Revisión ITV',    color:'#3b82f6' },
  { value:'reparacion',    label:'Reparación moto', color:'#22c55e' },
  { value:'primera',       label:'1ª Visita',       color:'#eab308' },
];
const SVC = Object.fromEntries(SERVICES.map(s=>[s.value,s]));

const DAYS_SHORT = ['Lun','Mar','Mié','Jue','Vie'];
const SLOTS = (() => {
  const s = [];
  for (let h=8; h<=18; h++) {
    s.push(pad(h)+':00');
    if (h<18) s.push(pad(h)+':30');
  }
  s.push('18:30');
  return s;
})();

// ═══════════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════════
function pad(n){ return String(n).padStart(2,'0'); }

function fmtDate(d){
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function todayStr(){ return fmtDate(new Date()); }

function fmtDisplay(d){
  return d.toLocaleDateString('es-ES',{day:'2-digit',month:'short'});
}

function getWeekDates(offset){
  const ref = new Date();
  ref.setDate(ref.getDate() + offset*7);
  const day = ref.getDay();
  const diff = day===0 ? -6 : 1-day;
  const mon = new Date(ref);
  mon.setDate(ref.getDate()+diff);
  return Array.from({length:5},(_,i)=>{
    const d=new Date(mon); d.setDate(mon.getDate()+i); return d;
  });
}

function uid(){ return '_'+Math.random().toString(36).slice(2,10); }

function $(id){ return document.getElementById(id); }
function el(tag,attrs={},...children){
  const e=document.createElement(tag);
  for(const[k,v] of Object.entries(attrs)){
    if(k==='class') e.className=v;
    else if(k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  }
  children.forEach(c=>{ if(c!=null) e.append(typeof c==='string'?c:c); });
  return e;
}

// ═══════════════════════════════════════════════════════════════════
// MOCK DB
// ═══════════════════════════════════════════════════════════════════
const today = todayStr();

let clientes = [
  {id:'c1',nombre:'Carlos',  apellidos:'García',    telefono:'600111222',dni:'12345678A'},
  {id:'c2',nombre:'María',   apellidos:'López',     telefono:'611333444',dni:'87654321B'},
  {id:'c3',nombre:'Alejandro',apellidos:'Martín',   telefono:'622555666',dni:''},
];
let motos = [
  {id:'m1',cliente_id:'c1',marca:'Honda', modelo:'CB500F',  cilindrada:'500',matricula:'1234ABC',bastidor:'JH2PC35...'},
  {id:'m2',cliente_id:'c2',marca:'Yamaha',modelo:'MT-07',   cilindrada:'700',matricula:'5678DEF',bastidor:'VN4RJ0...'},
  {id:'m3',cliente_id:'c3',marca:'KTM',   modelo:'Duke 390',cilindrada:'390',matricula:'9999GHI',bastidor:''},
];
let citas = [
  {id:'a1',cliente_id:'c1',moto_id:'m1',tipo_servicio:'mantenimiento',fecha_cita:today,hora_cita:'09:00',nota:'Cambio de aceite',estado:'scheduled'},
  {id:'a2',cliente_id:'c2',moto_id:'m2',tipo_servicio:'itv',          fecha_cita:today,hora_cita:'10:30',nota:'',               estado:'scheduled'},
  {id:'a3',cliente_id:'c3',moto_id:'m3',tipo_servicio:'primera',      fecha_cita:today,hora_cita:'12:00',nota:'Cliente nuevo',  estado:'scheduled'},
];

const DB = {
  getWeek(start,end){
    return citas
      .filter(c=>c.fecha_cita>=start && c.fecha_cita<=end)
      .map(c=>({
        ...c,
        clientes: clientes.find(cl=>cl.id===c.cliente_id)||null,
        motos:    motos.find(m=>m.id===c.moto_id)||null,
      }));
  },
  search(q){
    const lq=q.toLowerCase();
    const byC=clientes.filter(c=>
      c.nombre.toLowerCase().includes(lq)||
      (c.apellidos||'').toLowerCase().includes(lq)||
      (c.telefono||'').includes(lq)||
      (c.dni||'').toLowerCase().includes(lq)
    );
    const byM=motos
      .filter(m=>(m.matricula||'').toLowerCase().includes(lq))
      .map(m=>clientes.find(c=>c.id===m.cliente_id))
      .filter(Boolean);
    const seen=new Set();
    return [...byC,...byM].filter(c=>{if(seen.has(c.id))return false;seen.add(c.id);return true;});
  },
  getMotos(clienteId){ return motos.filter(m=>m.cliente_id===clienteId); },
  addCliente(d){ const c={id:uid(),...d}; clientes.push(c); return c; },
  addMoto(d)   { const m={id:uid(),...d}; motos.push(m); return m; },
  addCita(d)   { const a={id:uid(),estado:'scheduled',...d}; citas.push(a); return a; },
  cancel(id)   { const c=citas.find(a=>a.id===id); if(c) c.estado='cancelled'; },
  findDup(telefono,dni){
    return clientes.find(c=>
      (telefono&&c.telefono===telefono)||(dni&&dni!==''&&c.dni===dni)
    )||null;
  },
};

// ═══════════════════════════════════════════════════════════════════
// BUILD STATIC UI
// ═══════════════════════════════════════════════════════════════════
// Legend
const leg=$('legend');
SERVICES.forEach(s=>{
  leg.append(el('div',{class:'leg'},
    el('div',{class:'leg-dot',style:`background:${s.color}`}),
    s.label
  ));
});

// Hora select in cita form
const aHora=$('a-hora');
SLOTS.forEach(s=>{ const o=document.createElement('option'); o.value=s; o.textContent=s; aHora.append(o); });

// Service select
const aTipo=$('a-tipo');
SERVICES.forEach(s=>{ const o=document.createElement('option'); o.value=s.value; o.textContent=s.label; aTipo.append(o); });

// Default date
$('a-fecha').value=today;

// ═══════════════════════════════════════════════════════════════════
// CALENDAR STATE
// ═══════════════════════════════════════════════════════════════════
let weekOffset=0;

function renderCalendar(){
  const dates=getWeekDates(weekOffset);
  const start=fmtDate(dates[0]), end=fmtDate(dates[4]);
  $('week-label').textContent=`${fmtDisplay(dates[0])} – ${fmtDisplay(dates[4])}`;

  const data=DB.getWeek(start,end);
  const slotMap={};
  data.forEach(c=>{
    const key=`${c.fecha_cita}_${c.hora_cita}`;
    (slotMap[key]=slotMap[key]||[]).push(c);
  });

  const grid=$('cal-grid');
  grid.innerHTML='';

  // Header row
  grid.append(el('div',{class:'ch'})); // empty corner
  dates.forEach((d,i)=>{
    const isT=fmtDate(d)===today;
    grid.append(el('div',{class:'ch'+(isT?' today':'')},
      DAYS_SHORT[i],
      el('span',{class:'day-n'},String(d.getDate()))
    ));
  });

  // Slot rows
  SLOTS.forEach(slot=>{
    grid.append(el('div',{class:'tl'},slot));
    dates.forEach(d=>{
      const dateStr=fmtDate(d);
      const isT=dateStr===today;
      const key=`${dateStr}_${slot}`;
      const chips=slotMap[key]||[];
      const cell=el('div',{class:'cc'+(isT?' today-col':'')});
      cell.addEventListener('click',()=>{ if(!chips.length) openNew(); });
      chips.forEach(c=>{
        const svc=SVC[c.tipo_servicio]||{color:'#64748b',label:c.tipo_servicio};
        const chip=el('button',
          {class:'chip'+(c.estado==='cancelled'?' cancelled':''),style:`background:${svc.color}`},
          el('span',{class:'chip-name'},`${c.clientes?.nombre||''} ${c.clientes?.apellidos||''}`),
          el('span',{class:'chip-svc'},svc.label)
        );
        chip.addEventListener('click',ev=>{ ev.stopPropagation(); openDetail(c); });
        cell.append(chip);
      });
      grid.append(cell);
    });
  });
}

// Week nav
$('btn-prev').addEventListener('click',()=>{ weekOffset--; renderCalendar(); });
$('btn-next').addEventListener('click',()=>{ weekOffset++; renderCalendar(); });
$('btn-today').addEventListener('click',()=>{ weekOffset=0; renderCalendar(); });

// ═══════════════════════════════════════════════════════════════════
// MODAL HELPERS
// ═══════════════════════════════════════════════════════════════════
function openModal(id){ $(id).classList.add('open'); }
function closeModal(id){ $(id).classList.remove('open'); }

document.querySelectorAll('[data-close]').forEach(btn=>{
  btn.addEventListener('click',()=>closeModal(btn.dataset.close));
});
document.querySelectorAll('.backdrop').forEach(bd=>{
  bd.addEventListener('click',e=>{ if(e.target===bd) closeModal(bd.id); });
});

// ═══════════════════════════════════════════════════════════════════
// DETAIL MODAL
// ═══════════════════════════════════════════════════════════════════
let currentCitaId=null;

function openDetail(cita){
  currentCitaId=cita.id;
  const svc=SVC[cita.tipo_servicio]||{color:'#64748b',label:cita.tipo_servicio};
  const c=cita.clientes||{};
  const m=cita.motos||{};
  const cancelled=cita.estado==='cancelled';

  const body=$('detail-body');
  body.innerHTML='';

  // Badges
  const badgeRow=el('div',{style:'display:flex;gap:8px;align-items:center;margin-bottom:14px'});
  badgeRow.append(el('span',{class:'badge',style:`background:${svc.color}`},svc.label));
  if(cancelled) badgeRow.append(el('span',{class:'badge',style:'background:#64748b'},'Cancelada'));
  body.append(badgeRow);

  function section(title,...items){
    const sec=el('div',{class:'ds'});
    sec.append(el('h3',{},title));
    const dg=el('div',{class:'dg'});
    items.forEach(([lbl,val])=>{
      dg.append(el('div',{class:'di'},el('label',{},lbl),el('p',{},val||'—')));
    });
    sec.append(dg);
    body.append(sec);
  }

  section('📅 Fecha y Hora',['Fecha',cita.fecha_cita],['Hora',cita.hora_cita]);
  section('👤 Cliente',
    ['Nombre',`${c.nombre||''} ${c.apellidos||''}`],
    ['Teléfono',c.telefono],
    ['DNI',c.dni]
  );
  if(m.marca||m.matricula){
    section('🏍️ Moto',
      ['Marca / Modelo',`${m.marca||''} ${m.modelo||''}`],
      ['Matrícula',m.matricula],
      ['Cilindrada',m.cilindrada],
      ['Bastidor',m.bastidor]
    );
  }
  if(cita.nota){
    const ns=el('div',{class:'ds'});
    ns.append(el('h3',{},'📝 Nota'));
    ns.append(el('p',{style:'font-size:13px'},cita.nota));
    body.append(ns);
  }

  $('btn-cancel-cita').style.display=cancelled?'none':'';
  openModal('modal-detail');
}

$('btn-cancel-cita').addEventListener('click',()=>{
  const cita=citas.find(c=>c.id===currentCitaId);
  if(!cita) return;
  const name=`${cita.clientes?.nombre||''} ${cita.clientes?.apellidos||''}`.trim();
  $('confirm-msg').textContent=`¿Cancelar la cita de ${name||'este cliente'}?`;
  openModal('modal-confirm');
});

$('btn-confirm-ok').addEventListener('click',()=>{
  DB.cancel(currentCitaId);
  closeModal('modal-confirm');
  closeModal('modal-detail');
  renderCalendar();
});

// ═══════════════════════════════════════════════════════════════════
// NEW CITA MODAL
// ═══════════════════════════════════════════════════════════════════
const STEP_LABELS=['Tipo cliente','Cliente','Moto','Cita'];

let newStep='choice';  // choice | new-client | search | moto | cita
let newCliente=null;
let newClientMotos=[];
let newMotoId=null;   // selected moto id or 'new'

function stepNum(){
  const map={choice:1,'new-client':2,search:2,moto:3,cita:4};
  return map[newStep]||1;
}

function renderSteps(){
  const cur=stepNum();
  const el2=$('steps-new');
  el2.innerHTML='';
  STEP_LABELS.forEach((lbl,i)=>{
    const n=i+1;
    const state=cur>n?'done':cur===n?'active':'idle';
    const dot=document.createElement('div');
    dot.className='sdot '+state;
    dot.textContent=state==='done'?'✓':n;
    const label=document.createElement('span');
    label.className='slabel '+(state==='active'?'active':'idle');
    label.textContent=lbl;
    el2.append(dot,label);
    if(i<STEP_LABELS.length-1){
      const line=document.createElement('div');
      line.className='sline';
      el2.append(line);
    }
  });
}

function showPanel(id){
  document.querySelectorAll('.step-panel').forEach(p=>p.classList.remove('active'));
  $(id)&&$(id).classList.add('active');
}

function setAlert(html,type=''){
  const a=$('alert-new');
  a.innerHTML='';
  if(!html) return;
  a.innerHTML=`<div class="alert alert-${type||'err'}">${html}</div>`;
}

function updateFooter(){
  const back=$('btn-back');
  const next=$('btn-next-step');
  back.style.display=newStep==='choice'?'none':'';
  // Next button text / visibility
  if(newStep==='choice'){
    next.style.display='none';
  } else if(newStep==='new-client'){
    next.style.display='';
    next.textContent='Guardar cliente →';
    next.onclick=doSaveClient;
  } else if(newStep==='search'){
    next.style.display='none';
  } else if(newStep==='moto'){
    next.style.display='';
    next.textContent='Siguiente →';
    next.onclick=()=>goTo('cita');
  } else if(newStep==='cita'){
    next.style.display='';
    next.textContent='✓ Crear cita';
    next.onclick=doSaveCita;
  }
}

function goTo(step){
  newStep=step;
  renderSteps();
  const panelMap={choice:'panel-choice','new-client':'panel-new-client',search:'panel-search',moto:'panel-moto',cita:'panel-cita'};
  showPanel(panelMap[step]);
  setAlert('');
  updateFooter();
  if(step==='search') setTimeout(()=>$('search-q').focus(),50);
  if(step==='new-client') setTimeout(()=>$('c-nombre').focus(),50);
}

function openNew(){
  // Reset state
  newStep='choice'; newCliente=null; newClientMotos=[]; newMotoId=null;
  ['c-nombre','c-apellidos','c-telefono','c-dni','m-marca','m-modelo','m-cilindrada','m-matricula','m-bastidor','a-nota','search-q']
    .forEach(id=>$(id)&&($(id).value=''));
  $('a-fecha').value=today;
  $('a-hora').value='09:00';
  $('a-tipo').value='mantenimiento';
  $('search-results').style.display='none';
  $('search-results').innerHTML='';
  $('search-empty').style.display='none';
  renderSteps();
  showPanel('panel-choice');
  setAlert('');
  updateFooter();
  openModal('modal-new');
}

$('btn-new').addEventListener('click',openNew);
$('btn-back').addEventListener('click',()=>{
  const prev={
    'new-client':'choice',search:'choice',
    moto:'choice',cita:'moto'
  };
  goTo(prev[newStep]||'choice');
});

// Choice cards
$('btn-choice-new').addEventListener('click',()=>goTo('new-client'));
$('btn-choice-existing').addEventListener('click',()=>goTo('search'));

// ── Save new client ──
function doSaveClient(){
  const nombre=$('c-nombre').value.trim();
  if(!nombre){ setAlert('El nombre es obligatorio.'); return; }
  const telefono=$('c-telefono').value.trim();
  const dni=$('c-dni').value.trim();
  const dup=DB.findDup(telefono,dni);
  if(dup){
    const field=telefono&&dup.telefono===telefono?'teléfono':'DNI';
    setAlert(`Ya existe un cliente con ese ${field}: <strong>${dup.nombre} ${dup.apellidos}</strong>. <a href="#" style="color:var(--accent)" id="use-dup-link">Usar este cliente</a>`);
    setTimeout(()=>{
      const link=$('use-dup-link');
      if(link) link.addEventListener('click',ev=>{ ev.preventDefault(); selectCliente(dup); });
    },0);
    return;
  }
  const c=DB.addCliente({nombre,apellidos:$('c-apellidos').value.trim(),telefono,dni});
  selectCliente(c,true);
}

// ── Select existing client → go to moto ──
function selectCliente(c, skipMotos=false){
  newCliente=c;
  newClientMotos=DB.getMotos(c.id);

  // Client info banner
  $('moto-client-info').innerHTML=`Cliente: <strong>${c.nombre} ${c.apellidos||''}</strong>${c.telefono?` <span style="color:var(--muted)">· ${c.telefono}</span>`:''}`;

  // Populate moto select
  const sw=$('moto-select-wrap');
  const ms=$('moto-select');
  ms.innerHTML='';
  if(newClientMotos.length){
    newClientMotos.forEach(m=>{
      const o=document.createElement('option');
      o.value=m.id;
      o.textContent=`${m.marca} ${m.modelo} – ${m.matricula||'sin matrícula'}`;
      ms.append(o);
    });
    const oNew=document.createElement('option');
    oNew.value='new'; oNew.textContent='+ Registrar nueva moto';
    ms.append(oNew);
    sw.style.display='';
    ms.onchange=()=>toggleMotoForm();
    ms.value=newClientMotos[0].id;
    toggleMotoForm();
  } else {
    sw.style.display='none';
    $('moto-form').style.display='';
  }

  goTo('moto');
}

function toggleMotoForm(){
  const val=$('moto-select').value;
  $('moto-form').style.display=(val==='new'||newClientMotos.length===0)?'':'none';
}

// ── Real-time search ──
let searchTimer=null;
$('search-q').addEventListener('input',function(){
  clearTimeout(searchTimer);
  const q=this.value.trim();
  $('search-results').style.display='none';
  $('search-results').innerHTML='';
  $('search-empty').style.display='none';
  if(!q) return;
  searchTimer=setTimeout(()=>{
    const res=DB.search(q);
    const drop=$('search-results');
    if(res.length){
      drop.innerHTML='';
      res.forEach(c=>{
        const item=document.createElement('div');
        item.className='sitem';
        item.innerHTML=`<div class="sitem-name">${c.nombre} ${c.apellidos||''}</div><div class="sitem-meta">${c.telefono?'📞 '+c.telefono:''}${c.dni?' · DNI: '+c.dni:''}</div>`;
        item.addEventListener('click',()=>selectCliente(c));
        drop.append(item);
      });
      drop.style.display='';
    } else {
      const empty=$('search-empty');
      empty.innerHTML=`No se encontró ningún cliente. <br><button class="btn btn-sm btn-secondary" id="go-new-from-search" style="margin-top:6px">Crear como cliente nuevo</button>`;
      empty.style.display='';
      $('go-new-from-search').addEventListener('click',()=>{
        $('c-nombre').value=q;
        goTo('new-client');
      });
    }
  },280);
});

// ── Save cita ──
function doSaveCita(){
  const fecha=$('a-fecha').value;
  const hora=$('a-hora').value;
  if(!fecha||!hora){ setAlert('Fecha y hora son obligatorias.'); return; }

  let motoId=null;
  const selId=newClientMotos.length?$('moto-select').value:'new';
  if(selId==='new'){
    const marca=$('m-marca').value.trim();
    const matricula=$('m-matricula').value.trim();
    if(marca||matricula){
      const m=DB.addMoto({
        cliente_id:newCliente.id,
        marca,modelo:$('m-modelo').value.trim(),
        cilindrada:$('m-cilindrada').value.trim(),
        matricula,bastidor:$('m-bastidor').value.trim(),
      });
      motoId=m.id;
    }
  } else {
    motoId=selId;
  }

  DB.addCita({
    cliente_id:newCliente.id,
    moto_id:motoId,
    tipo_servicio:$('a-tipo').value,
    fecha_cita:fecha,
    hora_cita:hora,
    nota:$('a-nota').value.trim(),
  });

  closeModal('modal-new');
  renderCalendar();
}

renderCalendar();
</script>
