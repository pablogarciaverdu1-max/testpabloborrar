<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRM Taller de Motos</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface2: #334155;
      --border: #475569;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --accent: #3b82f6;
      --danger: #ef4444;
      --success: #22c55e;
    }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    .app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    /* Header */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .header h1 { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .legend { display: flex; gap: 14px; }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--muted); }
    .legend-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }

    /* Toolbar */
    .toolbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 8px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .week-nav { display: flex; align-items: center; gap: 8px; margin-left: 8px; }
    .week-label { font-size: 14px; font-weight: 600; min-width: 220px; text-align: center; }

    /* Calendar scroll area */
    .calendar-scroll { flex: 1; overflow: auto; }

    /* Calendar grid */
    .calendar {
      display: grid;
      grid-template-columns: 64px repeat(5, 1fr);
      min-width: 700px;
    }

    /* Sticky header row */
    .cal-col-header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: var(--bg);
      border-bottom: 2px solid var(--border);
      padding: 10px 6px;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      border-right: 1px solid var(--border);
    }
    .cal-col-header:last-child { border-right: none; }
    .cal-col-header.today { color: var(--accent); }
    .cal-col-header .day-num { font-size: 22px; font-weight: 700; line-height: 1; display: block; margin-top: 2px; }

    /* Time label */
    .time-label {
      border-right: 1px solid var(--border);
      border-bottom: 1px solid rgba(71,85,105,0.35);
      padding: 0 8px 0 0;
      font-size: 11px;
      color: var(--muted);
      text-align: right;
      display: flex;
      align-items: flex-start;
      padding-top: 4px;
      height: 40px;
    }

    /* Calendar cell */
    .cal-cell {
      border-right: 1px solid var(--border);
      border-bottom: 1px solid rgba(71,85,105,0.35);
      height: 40px;
      position: relative;
      cursor: pointer;
      transition: background 0.1s;
    }
    .cal-cell:last-child { border-right: none; }
    .cal-cell:hover { background: rgba(59,130,246,0.07); }
    .cal-cell.today-col { background: rgba(59,130,246,0.04); }

    /* Appointment chip */
    .apt-chip {
      position: absolute;
      inset: 2px;
      border-radius: 4px;
      padding: 3px 6px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 1px;
      z-index: 2;
      border: none;
      text-align: left;
      color: white;
    }
    .apt-chip:hover { filter: brightness(1.12); }
    .apt-chip .apt-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .apt-chip .apt-svc  { font-weight: 400; opacity: 0.88; font-size: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .apt-chip.cancelled { opacity: 0.4; }
    .apt-chip.cancelled .apt-name { text-decoration: line-through; }

    /* Buttons */
    .btn { padding: 7px 14px; border-radius: 6px; border: none; font-size: 13px; font-weight: 500; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: all 0.15s; white-space: nowrap; }
    .btn-primary  { background: var(--accent); color: white; }
    .btn-primary:hover  { background: #2563eb; }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--border); }
    .btn-danger   { background: var(--danger); color: white; }
    .btn-danger:hover { background: #dc2626; }
    .btn-ghost    { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--surface2); color: var(--text); }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Modal */
    .backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; width: 100%; max-width: 540px; max-height: 90vh; overflow-y: auto; display: flex; flex-direction: column; }
    .modal-header { padding: 18px 22px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .modal-header h2 { font-size: 17px; font-weight: 700; }
    .modal-body   { padding: 18px 22px; flex: 1; }
    .modal-footer { padding: 14px 22px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; flex-shrink: 0; }
    .close-btn { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; padding: 2px 6px; border-radius: 4px; line-height: 1; }
    .close-btn:hover { background: var(--surface2); color: var(--text); }

    /* Form */
    .form-group { margin-bottom: 13px; }
    .form-group label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
    .form-group label.req::after { content: ' *'; color: var(--danger); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    input, select, textarea {
      width: 100%; padding: 8px 11px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text); font-size: 13px;
      font-family: inherit; transition: border-color 0.15s;
    }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
    input::placeholder, textarea::placeholder { color: var(--muted); }
    textarea { resize: vertical; min-height: 72px; }
    select option { background: var(--surface2); }

    /* Step indicator */
    .steps { display: flex; align-items: center; gap: 6px; margin-bottom: 18px; }
    .step-dot { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }
    .step-dot.active { background: var(--accent); color: white; }
    .step-dot.done   { background: var(--success); color: white; }
    .step-dot.idle   { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
    .step-label { font-size: 12px; }
    .step-label.active { color: var(--text); }
    .step-label.idle   { color: var(--muted); }
    .step-line { flex: 1; height: 1px; background: var(--border); }

    /* Choice cards */
    .choice-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 6px; }
    .choice-card {
      background: var(--surface2); border: 2px solid var(--border);
      border-radius: 10px; padding: 22px 16px; cursor: pointer;
      text-align: center; transition: all 0.15s;
    }
    .choice-card:hover { border-color: var(--accent); background: rgba(59,130,246,0.08); }
    .choice-card .cc-icon { font-size: 32px; margin-bottom: 8px; }
    .choice-card .cc-title { font-size: 15px; font-weight: 700; }
    .choice-card .cc-desc { font-size: 12px; color: var(--muted); margin-top: 3px; }

    /* Search results dropdown */
    .search-drop { border: 1px solid var(--border); border-radius: 6px; background: var(--surface2); max-height: 190px; overflow-y: auto; margin-top: 4px; }
    .search-item { padding: 10px 12px; cursor: pointer; border-bottom: 1px solid var(--border); transition: background 0.1s; }
    .search-item:last-child { border-bottom: none; }
    .search-item:hover { background: var(--border); }
    .search-item .si-name { font-weight: 600; font-size: 13px; }
    .search-item .si-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* Alerts */
    .alert { padding: 9px 13px; border-radius: 6px; font-size: 13px; margin-bottom: 12px; }
    .alert-err  { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
    .alert-ok   { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); color: #86efac; }
    .alert-info { background: rgba(59,130,246,0.15); border: 1px solid rgba(59,130,246,0.3); color: #93c5fd; }

    /* Detail view */
    .detail-section { margin-bottom: 14px; }
    .detail-section h3 { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 8px; }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .detail-item label { font-size: 11px; color: var(--muted); }
    .detail-item p { font-size: 14px; font-weight: 500; margin-top: 1px; }
    .svc-badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; color: white; }

    @media (max-width: 600px) {
      .form-row, .form-row-3, .choice-cards { grid-template-columns: 1fr; }
      .legend { display: none; }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ─── Constants ───────────────────────────────────────────────────────────────
const SERVICES = [
  { value: 'mantenimiento', label: 'Mantenimiento',   color: '#ef4444' },
  { value: 'siniestro',     label: 'Siniestro',       color: '#f97316' },
  { value: 'itv',           label: 'Revisión ITV',    color: '#3b82f6' },
  { value: 'reparacion',    label: 'Reparación moto', color: '#22c55e' },
  { value: 'primera',       label: '1ª Visita',       color: '#eab308' },
];
const SVC_MAP = Object.fromEntries(SERVICES.map(s => [s.value, s]));

// 08:00 → 18:30, slots de 30 min = 22 slots
const SLOTS = [];
for (let h = 8; h <= 18; h++) {
  SLOTS.push(`${String(h).padStart(2,'0')}:00`);
  if (h < 18) SLOTS.push(`${String(h).padStart(2,'0')}:30`);
}
SLOTS.push('18:30');

const DAYS_SHORT = ['Lun','Mar','Mié','Jue','Vie'];

// ─── Mock data store (in-memory, simulates a DB) ─────────────────────────────
let _clientes = [
  { id: 'c1', nombre: 'Carlos',  apellidos: 'García',   telefono: '600111222', dni: '12345678A' },
  { id: 'c2', nombre: 'María',   apellidos: 'López',    telefono: '611333444', dni: '87654321B' },
  { id: 'c3', nombre: 'Alejandro', apellidos: 'Martín', telefono: '622555666', dni: ''          },
];
let _motos = [
  { id: 'm1', cliente_id: 'c1', marca: 'Honda',  modelo: 'CB500F', cilindrada: '500', matricula: '1234ABC', bastidor: 'JH2PC35...' },
  { id: 'm2', cliente_id: 'c2', marca: 'Yamaha', modelo: 'MT-07',  cilindrada: '700', matricula: '5678DEF', bastidor: 'VN4RJ0...'  },
  { id: 'm3', cliente_id: 'c3', marca: 'KTM',    modelo: 'Duke 390', cilindrada: '390', matricula: '9999GHI', bastidor: '' },
];

const today = new Date();
const pad = n => String(n).padStart(2,'0');
const todayStr = `${today.getFullYear()}-${pad(today.getMonth()+1)}-${pad(today.getDate())}`;

let _citas = [
  { id: 'a1', cliente_id:'c1', moto_id:'m1', tipo_servicio:'mantenimiento', fecha_cita: todayStr, hora_cita:'09:00', nota:'Cambio de aceite', estado:'scheduled', fecha_creacion: new Date().toISOString() },
  { id: 'a2', cliente_id:'c2', moto_id:'m2', tipo_servicio:'itv',           fecha_cita: todayStr, hora_cita:'10:30', nota:'',               estado:'scheduled', fecha_creacion: new Date().toISOString() },
  { id: 'a3', cliente_id:'c3', moto_id:'m3', tipo_servicio:'primera',       fecha_cita: todayStr, hora_cita:'12:00', nota:'Cliente nuevo',   estado:'scheduled', fecha_creacion: new Date().toISOString() },
];

// Mock DB API (will be replaced by Supabase calls later)
const DB = {
  getCitasByWeek(start, end) {
    const result = _citas
      .filter(c => c.fecha_cita >= start && c.fecha_cita <= end)
      .map(c => ({
        ...c,
        clientes: _clientes.find(cl => cl.id === c.cliente_id) || null,
        motos:    _motos.find(m => m.id === c.moto_id) || null,
      }));
    return result;
  },
  searchClientes(q) {
    const lq = q.toLowerCase();
    const byClient = _clientes.filter(c =>
      c.nombre.toLowerCase().includes(lq) ||
      (c.apellidos||'').toLowerCase().includes(lq) ||
      (c.telefono||'').includes(lq) ||
      (c.dni||'').toLowerCase().includes(lq)
    );
    const byMoto = _motos
      .filter(m => (m.matricula||'').toLowerCase().includes(lq))
      .map(m => _clientes.find(c => c.id === m.cliente_id))
      .filter(Boolean);
    const seen = new Set();
    return [...byClient, ...byMoto].filter(c => { if (seen.has(c.id)) return false; seen.add(c.id); return true; });
  },
  getMotosByCliente(clienteId) {
    return _motos.filter(m => m.cliente_id === clienteId);
  },
  createCliente(data) {
    const c = { id: 'c' + Date.now(), fecha_creacion: new Date().toISOString(), ...data };
    _clientes.push(c);
    return c;
  },
  createMoto(data) {
    const m = { id: 'm' + Date.now(), fecha_creacion: new Date().toISOString(), ...data };
    _motos.push(m);
    return m;
  },
  createCita(data) {
    const a = { id: 'a' + Date.now(), fecha_creacion: new Date().toISOString(), estado: 'scheduled', ...data };
    _citas.push(a);
    return a;
  },
  cancelCita(id) {
    const c = _citas.find(a => a.id === id);
    if (c) c.estado = 'cancelled';
  },
  findDuplicate(telefono, dni) {
    return _clientes.find(c =>
      (telefono && c.telefono === telefono) ||
      (dni && dni && c.dni === dni)
    ) || null;
  },
};

// ─── Date helpers ─────────────────────────────────────────────────────────────
function getWeekDates(offset) {
  const ref = new Date();
  ref.setDate(ref.getDate() + offset * 7);
  const day = ref.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  const mon = new Date(ref);
  mon.setDate(ref.getDate() + diff);
  return Array.from({ length: 5 }, (_, i) => {
    const d = new Date(mon);
    d.setDate(mon.getDate() + i);
    return d;
  });
}
function fmtDate(d) { return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function fmtDisplay(d) { return d.toLocaleDateString('es-ES', { day:'2-digit', month:'short' }); }
function isToday(d) { return fmtDate(d) === todayStr; }

// ─── App ──────────────────────────────────────────────────────────────────────
function App() {
  const [weekOffset, setWeekOffset] = useState(0);
  const [citas, setCitas] = useState([]);
  const [showNew, setShowNew] = useState(false);
  const [detailCita, setDetailCita] = useState(null);
  const [confirmCancel, setConfirmCancel] = useState(false);

  const weekDates = getWeekDates(weekOffset);
  const weekStart = fmtDate(weekDates[0]);
  const weekEnd   = fmtDate(weekDates[4]);

  const load = useCallback(() => {
    setCitas(DB.getCitasByWeek(weekStart, weekEnd));
  }, [weekStart, weekEnd]);

  useEffect(() => { load(); }, [load]);

  // Build slot → citas map
  const slotMap = {};
  citas.forEach(c => {
    const key = `${c.fecha_cita}_${c.hora_cita}`;
    (slotMap[key] = slotMap[key] || []).push(c);
  });

  function handleCancelConfirmed() {
    DB.cancelCita(detailCita.id);
    setConfirmCancel(false);
    setDetailCita(null);
    load();
  }

  return (
    <div className="app">
      {/* Header */}
      <div className="header">
        <h1>🏍️ CRM Taller de Motos</h1>
        <div className="legend">
          {SERVICES.map(s => (
            <div key={s.value} className="legend-item">
              <div className="legend-dot" style={{background:s.color}} />
              {s.label}
            </div>
          ))}
        </div>
      </div>

      {/* Toolbar */}
      <div className="toolbar">
        <button className="btn btn-primary" onClick={() => setShowNew(true)}>+ Nueva Cita</button>
        <div className="week-nav">
          <button className="btn btn-ghost btn-sm" onClick={() => setWeekOffset(o => o-1)}>‹ Anterior</button>
          <span className="week-label">{fmtDisplay(weekDates[0])} – {fmtDisplay(weekDates[4])}</span>
          <button className="btn btn-ghost btn-sm" onClick={() => setWeekOffset(o => o+1)}>Siguiente ›</button>
        </div>
        <button className="btn btn-secondary btn-sm" onClick={() => setWeekOffset(0)}>Hoy</button>
      </div>

      {/* Calendar */}
      <div className="calendar-scroll">
        <div className="calendar">
          {/* Column headers */}
          <div className="cal-col-header" style={{position:'sticky',top:0}} />
          {weekDates.map((d, i) => (
            <div key={i} className={`cal-col-header${isToday(d) ? ' today' : ''}`}>
              {DAYS_SHORT[i]}
              <span className="day-num">{d.getDate()}</span>
            </div>
          ))}

          {/* Slot rows */}
          {SLOTS.map(slot => (
            <React.Fragment key={slot}>
              <div className="time-label">{slot}</div>
              {weekDates.map((d, di) => {
                const dateStr = fmtDate(d);
                const key = `${dateStr}_${slot}`;
                const chips = slotMap[key] || [];
                return (
                  <div
                    key={di}
                    className={`cal-cell${isToday(d) ? ' today-col' : ''}`}
                    onClick={() => { if (!chips.length) setShowNew(true); }}
                  >
                    {chips.map(c => {
                      const svc = SVC_MAP[c.tipo_servicio] || { color:'#64748b', label: c.tipo_servicio };
                      return (
                        <button
                          key={c.id}
                          className={`apt-chip${c.estado==='cancelled' ? ' cancelled' : ''}`}
                          style={{background: svc.color}}
                          onClick={e => { e.stopPropagation(); setDetailCita(c); }}
                        >
                          <span className="apt-name">
                            {c.clientes?.nombre} {c.clientes?.apellidos}
                          </span>
                          <span className="apt-svc">{svc.label}</span>
                        </button>
                      );
                    })}
                  </div>
                );
              })}
            </React.Fragment>
          ))}
        </div>
      </div>

      {/* Modals */}
      {showNew && (
        <NewCitaModal
          onClose={() => setShowNew(false)}
          onCreated={() => { setShowNew(false); load(); }}
        />
      )}
      {detailCita && !confirmCancel && (
        <DetailModal
          cita={detailCita}
          onClose={() => setDetailCita(null)}
          onCancel={() => setConfirmCancel(true)}
        />
      )}
      {confirmCancel && (
        <ConfirmModal
          message={`¿Cancelar la cita de ${detailCita?.clientes?.nombre} ${detailCita?.clientes?.apellidos || ''}?`}
          onConfirm={handleCancelConfirmed}
          onClose={() => setConfirmCancel(false)}
        />
      )}
    </div>
  );
}

// ─── New Cita Modal (4 steps) ─────────────────────────────────────────────────
const STEP_LABELS = ['Tipo cliente', 'Cliente', 'Moto', 'Cita'];

function StepIndicator({ current }) {
  return (
    <div className="steps">
      {STEP_LABELS.map((label, i) => {
        const n = i + 1;
        const state = current > n ? 'done' : current === n ? 'active' : 'idle';
        return (
          <React.Fragment key={i}>
            <div className={`step-dot ${state}`}>{state === 'done' ? '✓' : n}</div>
            <span className={`step-label ${state === 'active' ? 'active' : 'idle'}`}>{label}</span>
            {i < STEP_LABELS.length - 1 && <div className="step-line" />}
          </React.Fragment>
        );
      })}
    </div>
  );
}

function NewCitaModal({ onClose, onCreated }) {
  // step: 'choice' | 'new-client' | 'search-client' | 'moto' | 'cita'
  const [step, setStep] = useState('choice');
  const [err, setErr]   = useState('');

  // Data accumulated across steps
  const [cliente, setCliente]       = useState(null);
  const [clientMotos, setClientMotos] = useState([]);
  const [selectedMotoId, setSelectedMotoId] = useState('new');

  const [clientForm, setClientForm] = useState({ nombre:'', apellidos:'', telefono:'', dni:'' });
  const [motoForm,   setMotoForm]   = useState({ marca:'', modelo:'', cilindrada:'', matricula:'', bastidor:'' });
  const [citaForm,   setCitaForm]   = useState({
    tipo_servicio: 'mantenimiento',
    fecha_cita: todayStr,
    hora_cita: '09:00',
    nota: '',
  });

  // Search
  const [query,   setQuery]   = useState('');
  const [results, setResults] = useState([]);
  const timer = useRef(null);

  useEffect(() => {
    if (step !== 'search-client') return;
    if (timer.current) clearTimeout(timer.current);
    if (!query.trim()) { setResults([]); return; }
    timer.current = setTimeout(() => {
      setResults(DB.searchClientes(query.trim()));
    }, 250);
  }, [query, step]);

  function pickCliente(c) {
    setCliente(c);
    const motos = DB.getMotosByCliente(c.id);
    setClientMotos(motos);
    setSelectedMotoId(motos.length ? motos[0].id : 'new');
    setStep('moto');
    setErr('');
  }

  function saveNewClient() {
    if (!clientForm.nombre.trim()) { setErr('El nombre es obligatorio.'); return; }
    const dup = DB.findDuplicate(clientForm.telefono, clientForm.dni);
    if (dup) {
      setErr(`Ya existe un cliente con ese ${clientForm.telefono && dup.telefono === clientForm.telefono ? 'teléfono' : 'DNI'}: ${dup.nombre} ${dup.apellidos}. ¿Usar el existente?`);
      return;
    }
    const c = DB.createCliente(clientForm);
    setCliente(c);
    setClientMotos([]);
    setSelectedMotoId('new');
    setStep('moto');
    setErr('');
  }

  function saveCita() {
    if (!citaForm.fecha_cita || !citaForm.hora_cita) { setErr('Fecha y hora son obligatorias.'); return; }
    let motoId = null;
    if (selectedMotoId === 'new') {
      if (motoForm.marca || motoForm.matricula) {
        const m = DB.createMoto({ ...motoForm, cliente_id: cliente.id });
        motoId = m.id;
      }
    } else {
      motoId = selectedMotoId;
    }
    DB.createCita({ ...citaForm, cliente_id: cliente.id, moto_id: motoId });
    onCreated();
  }

  const stepNum = { choice:1, 'new-client':2, 'search-client':2, moto:3, cita:4 }[step] || 1;

  function goBack() {
    setErr('');
    if (step === 'new-client' || step === 'search-client') setStep('choice');
    else if (step === 'moto') setStep('choice');
    else if (step === 'cita') setStep('moto');
  }

  return (
    <div className="backdrop">
      <div className="modal">
        <div className="modal-header">
          <h2>Nueva Cita</h2>
          <button className="close-btn" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <StepIndicator current={stepNum} />
          {err && <div className="alert alert-err">{err}</div>}

          {step === 'choice' && (
            <div>
              <p style={{color:'var(--muted)', fontSize:'13px', marginBottom:'14px'}}>
                ¿El cliente ya está registrado en el sistema?
              </p>
              <div className="choice-cards">
                <div className="choice-card" onClick={() => { setErr(''); setStep('new-client'); }}>
                  <div className="cc-icon">👤</div>
                  <div className="cc-title">Cliente nuevo</div>
                  <div className="cc-desc">Primera vez en el taller</div>
                </div>
                <div className="choice-card" onClick={() => { setErr(''); setStep('search-client'); }}>
                  <div className="cc-icon">🔍</div>
                  <div className="cc-title">Cliente existente</div>
                  <div className="cc-desc">Buscar por nombre, DNI, teléfono o matrícula</div>
                </div>
              </div>
            </div>
          )}

          {step === 'new-client' && (
            <>
              <div className="form-row">
                <div className="form-group">
                  <label className="req">Nombre</label>
                  <input value={clientForm.nombre} onChange={e=>setClientForm(f=>({...f,nombre:e.target.value}))} placeholder="Nombre" autoFocus />
                </div>
                <div className="form-group">
                  <label>Apellidos</label>
                  <input value={clientForm.apellidos} onChange={e=>setClientForm(f=>({...f,apellidos:e.target.value}))} placeholder="Apellidos" />
                </div>
              </div>
              <div className="form-row">
                <div className="form-group">
                  <label>Teléfono</label>
                  <input value={clientForm.telefono} onChange={e=>setClientForm(f=>({...f,telefono:e.target.value}))} placeholder="600 000 000" type="tel" />
                </div>
                <div className="form-group">
                  <label>DNI (opcional)</label>
                  <input value={clientForm.dni} onChange={e=>setClientForm(f=>({...f,dni:e.target.value}))} placeholder="12345678A" />
                </div>
              </div>
            </>
          )}

          {step === 'search-client' && (
            <>
              <div className="form-group">
                <label>Buscar por nombre, DNI, teléfono o matrícula</label>
                <input autoFocus value={query} onChange={e=>setQuery(e.target.value)} placeholder="Escribe para buscar..." />
              </div>
              {results.length > 0 && (
                <div className="search-drop">
                  {results.map(c => (
                    <div key={c.id} className="search-item" onClick={() => pickCliente(c)}>
                      <div className="si-name">{c.nombre} {c.apellidos}</div>
                      <div className="si-meta">
                        {c.telefono && `📞 ${c.telefono}`}
                        {c.dni && ` · DNI: ${c.dni}`}
                      </div>
                    </div>
                  ))}
                </div>
              )}
              {query && results.length === 0 && (
                <div className="alert alert-info">
                  No encontrado.{' '}
                  <button className="btn btn-sm btn-secondary" style={{marginTop:'6px'}}
                    onClick={() => { setClientForm({nombre:query,apellidos:'',telefono:'',dni:''}); setStep('new-client'); setErr(''); }}>
                    Crear como cliente nuevo
                  </button>
                </div>
              )}
            </>
          )}

          {step === 'moto' && (
            <>
              <div className="alert alert-ok" style={{marginBottom:'14px'}}>
                Cliente: <strong>{cliente?.nombre} {cliente?.apellidos}</strong>
                {cliente?.telefono && <span style={{color:'var(--muted)'}}> · {cliente.telefono}</span>}
              </div>
              {clientMotos.length > 0 && (
                <div className="form-group">
                  <label>Moto del cliente</label>
                  <select value={selectedMotoId} onChange={e=>setSelectedMotoId(e.target.value)}>
                    {clientMotos.map(m => (
                      <option key={m.id} value={m.id}>{m.marca} {m.modelo} – {m.matricula || 'sin matrícula'}</option>
                    ))}
                    <option value="new">+ Registrar nueva moto</option>
                  </select>
                </div>
              )}
              {(selectedMotoId === 'new' || clientMotos.length === 0) && (
                <>
                  <div className="form-row">
                    <div className="form-group">
                      <label>Marca</label>
                      <input value={motoForm.marca} onChange={e=>setMotoForm(f=>({...f,marca:e.target.value}))} placeholder="Honda, Yamaha..." />
                    </div>
                    <div className="form-group">
                      <label>Modelo</label>
                      <input value={motoForm.modelo} onChange={e=>setMotoForm(f=>({...f,modelo:e.target.value}))} placeholder="CB500, MT-07..." />
                    </div>
                  </div>
                  <div className="form-row-3">
                    <div className="form-group">
                      <label>Cilindrada</label>
                      <input value={motoForm.cilindrada} onChange={e=>setMotoForm(f=>({...f,cilindrada:e.target.value}))} placeholder="500cc" />
                    </div>
                    <div className="form-group">
                      <label>Matrícula</label>
                      <input value={motoForm.matricula} onChange={e=>setMotoForm(f=>({...f,matricula:e.target.value}))} placeholder="1234ABC" />
                    </div>
                    <div className="form-group">
                      <label>Bastidor (VIN)</label>
                      <input value={motoForm.bastidor} onChange={e=>setMotoForm(f=>({...f,bastidor:e.target.value}))} placeholder="VIN..." />
                    </div>
                  </div>
                </>
              )}
            </>
          )}

          {step === 'cita' && (
            <>
              <div className="form-group">
                <label className="req">Tipo de servicio</label>
                <select value={citaForm.tipo_servicio} onChange={e=>setCitaForm(f=>({...f,tipo_servicio:e.target.value}))}>
                  {SERVICES.map(s => <option key={s.value} value={s.value}>{s.label}</option>)}
                </select>
              </div>
              <div className="form-row">
                <div className="form-group">
                  <label className="req">Fecha</label>
                  <input type="date" value={citaForm.fecha_cita} onChange={e=>setCitaForm(f=>({...f,fecha_cita:e.target.value}))} />
                </div>
                <div className="form-group">
                  <label className="req">Hora</label>
                  <select value={citaForm.hora_cita} onChange={e=>setCitaForm(f=>({...f,hora_cita:e.target.value}))}>
                    {SLOTS.map(s => <option key={s} value={s}>{s}</option>)}
                  </select>
                </div>
              </div>
              <div className="form-group">
                <label>Nota</label>
                <textarea value={citaForm.nota} onChange={e=>setCitaForm(f=>({...f,nota:e.target.value}))} placeholder="Descripción del problema, observaciones..." />
              </div>
            </>
          )}
        </div>

        <div className="modal-footer">
          {step !== 'choice' && <button className="btn btn-ghost" onClick={goBack}>← Atrás</button>}
          <button className="btn btn-secondary" onClick={onClose}>Cancelar</button>
          {step === 'new-client'    && <button className="btn btn-primary" onClick={saveNewClient}>Guardar cliente →</button>}
          {step === 'moto'          && <button className="btn btn-primary" onClick={() => { setErr(''); setStep('cita'); }}>Siguiente →</button>}
          {step === 'cita'          && <button className="btn btn-primary" onClick={saveCita}>✓ Crear cita</button>}
        </div>
      </div>
    </div>
  );
}

// ─── Detail Modal ──────────────────────────────────────────────────────────────
function DetailModal({ cita, onClose, onCancel }) {
  const svc = SVC_MAP[cita.tipo_servicio] || { color:'#64748b', label: cita.tipo_servicio };
  const c = cita.clientes || {};
  const m = cita.motos    || {};
  return (
    <div className="backdrop">
      <div className="modal">
        <div className="modal-header">
          <h2>Detalle de Cita</h2>
          <button className="close-btn" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <div style={{display:'flex', gap:'8px', alignItems:'center', marginBottom:'16px'}}>
            <span className="svc-badge" style={{background:svc.color}}>{svc.label}</span>
            {cita.estado === 'cancelled' && <span className="svc-badge" style={{background:'#64748b'}}>Cancelada</span>}
          </div>
          <div className="detail-section">
            <h3>📅 Fecha y Hora</h3>
            <div className="detail-grid">
              <div className="detail-item"><label>Fecha</label><p>{cita.fecha_cita}</p></div>
              <div className="detail-item"><label>Hora</label><p>{cita.hora_cita}</p></div>
            </div>
          </div>
          <div className="detail-section">
            <h3>👤 Cliente</h3>
            <div className="detail-grid">
              <div className="detail-item"><label>Nombre</label><p>{c.nombre} {c.apellidos}</p></div>
              <div className="detail-item"><label>Teléfono</label><p>{c.telefono || '—'}</p></div>
              <div className="detail-item"><label>DNI</label><p>{c.dni || '—'}</p></div>
            </div>
          </div>
          {(m.marca || m.matricula) && (
            <div className="detail-section">
              <h3>🏍️ Moto</h3>
              <div className="detail-grid">
                <div className="detail-item"><label>Marca / Modelo</label><p>{m.marca} {m.modelo}</p></div>
                <div className="detail-item"><label>Matrícula</label><p>{m.matricula || '—'}</p></div>
                {m.cilindrada && <div className="detail-item"><label>Cilindrada</label><p>{m.cilindrada}</p></div>}
                {m.bastidor   && <div className="detail-item"><label>Bastidor</label><p>{m.bastidor}</p></div>}
              </div>
            </div>
          )}
          {cita.nota && (
            <div className="detail-section">
              <h3>📝 Nota</h3>
              <p style={{fontSize:'14px'}}>{cita.nota}</p>
            </div>
          )}
        </div>
        <div className="modal-footer">
          <button className="btn btn-secondary" onClick={onClose}>Cerrar</button>
          {cita.estado !== 'cancelled' && <button className="btn btn-danger" onClick={onCancel}>Cancelar cita</button>}
        </div>
      </div>
    </div>
  );
}

// ─── Confirm Modal ────────────────────────────────────────────────────────────
function ConfirmModal({ message, onConfirm, onClose }) {
  return (
    <div className="backdrop">
      <div className="modal" style={{maxWidth:380}}>
        <div className="modal-header">
          <h2>Confirmar cancelación</h2>
          <button className="close-btn" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <p style={{color:'var(--muted)', fontSize:'14px'}}>{message}</p>
          <p style={{fontSize:'13px', color:'var(--muted)', marginTop:'8px'}}>Esta acción no se puede deshacer.</p>
        </div>
        <div className="modal-footer">
          <button className="btn btn-secondary" onClick={onClose}>No, mantener</button>
          <button className="btn btn-danger" onClick={onConfirm}>Sí, cancelar cita</button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
